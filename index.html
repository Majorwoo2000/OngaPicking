<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ルミピッキング検索</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1a2744;--navy2:#243259;--blue:#2563eb;--blue2:#60a5fa;
  --red:#e84040;--bg:#f0f2f7;--card:#fff;--muted:#6b7a99;--border:#dde2ef;
}
body{
  background:var(--bg);color:var(--navy);
  font-family:'Inter','Noto Sans JP',-apple-system,BlinkMacSystemFont,sans-serif;
  height:100dvh;overflow:hidden;display:flex;flex-direction:column
}

/* header */
header{
  background:#0a0e1f;color:#fff;padding:10px 16px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  position:relative;border-bottom:1px solid rgba(37,99,235,0.25)
}
header::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,#2563eb 35%,#60a5fa 70%,transparent);
  pointer-events:none
}
.logo{
  width:28px;height:28px;
  background:linear-gradient(135deg,#2563eb,#60a5fa);
  border-radius:7px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;box-shadow:0 2px 8px rgba(37,99,235,0.4)
}
h1{font-size:14px;font-weight:700;flex:1;letter-spacing:-0.2px}
h1 small{font-size:10px;color:rgba(255,255,255,0.45);display:block;font-weight:400}
.hbtn{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  color:#fff;border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer;
  transition:all 0.15s
}
.hbtn:active{transform:scale(0.93)}
.hbtn.on{position:relative;overflow:hidden}
.hbtn.on::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);animation:btnShine 2.5s ease infinite}
@keyframes btnShine{0%{left:-100%}100%{left:200%}}
.hbtn.on{background:#2563eb;border-color:#2563eb}

/* layout */
.layout{display:flex;flex:1;overflow:hidden}
.lpanel{display:flex;flex-direction:column;width:400px;flex-shrink:0;border-right:1px solid var(--border);position:relative;overflow:hidden}.lpanel::before{content:'LUMI_Onga';position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:60px;font-weight:900;color:rgba(37,99,235,0.04);pointer-events:none;letter-spacing:-4px;line-height:1;z-index:0}
.rpanel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:linear-gradient(160deg,#f5f7fc,#eef1f8)}

/* search bar */
.sbar{background:linear-gradient(135deg,#1e2d52,#2a3d6e);padding:12px 14px;flex-shrink:0}
.swrap{
  display:flex;gap:8px;align-items:center;
  background:rgba(255,255,255,0.1);border-radius:10px;
  padding:8px 12px;border:1.5px solid rgba(255,255,255,0.15);
  transition:border-color 0.2s,box-shadow 0.2s
}
.swrap:focus-within{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.15)}
#si{
  background:none;border:none;outline:none;flex:1;
  font-size:20px;font-weight:700;color:#fff;letter-spacing:2px;
  width:0;min-width:0;font-family:inherit
}
#si::placeholder{color:rgba(255,255,255,0.3);font-size:13px;font-weight:400;letter-spacing:0}
.clr{
  background:rgba(255,255,255,0.15);border:none;color:#fff;
  width:26px;height:26px;border-radius:50%;font-size:12px;
  cursor:pointer;display:none;align-items:center;justify-content:center
}
.hint{font-size:10px;color:rgba(255,255,255,0.4);text-align:center;padding:4px 0 0}

/* result card */
.rescrd{
  margin:12px 14px 0;background:var(--card);border-radius:12px;
  padding:14px 16px;position:relative;overflow:hidden;
  box-shadow:0 4px 20px rgba(37,99,235,0.12);
  display:none;flex-shrink:0;animation:slin 0.2s ease
}
.rescrd::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--rescrd-color,linear-gradient(90deg,#2563eb,#60a5fa))
}
.rescrd.room-nov::before{background:linear-gradient(90deg,#34d399,#6ee7b7)}
.rescrd.room-2f::before{background:linear-gradient(90deg,#f5a623,#f7c06a)}
@keyframes slin{from{opacity:0;transform:translateY(-5px) scale(0.99)}to{opacity:1;transform:translateY(0) scale(1)}}
.pname{font-size:15px;font-weight:700;margin-bottom:8px;line-height:1.4;color:var(--navy);letter-spacing:-0.1px}
.badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;border-radius:16px;padding:5px 12px;font-size:11px;font-weight:500;letter-spacing:0.1px}
.b-code{background:#f5f7fa;color:var(--muted)}
.b-room{background:#eef2ff;color:var(--navy);border:1px solid #c7d1ef}
.b-col{background:#2563eb;color:#fff;font-size:15px;font-weight:700;padding:5px 14px}

/* scroll area */
.lcontent{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:linear-gradient(180deg,#f0f2f7,#eef0f6)}

/* idle */
.idle-box{padding:20px 14px 0;text-align:center}
.idle-box .et{font-size:15px;font-weight:600;color:var(--navy);letter-spacing:0.2px}
.idle-box .es{font-size:12px;color:#b0b8c8;margin-top:6px}
.truck-stage{position:relative;width:100%;height:80px;overflow:hidden;margin:4px 0 8px}
.truck-road{position:absolute;bottom:0;left:0;right:0;height:20px;background:#dde2ef;border-radius:3px;opacity:0;transition:opacity 0.4s}
.truck-rl{position:absolute;bottom:7px;height:3px;width:36px;background:#c8d0e0;border-radius:2px}
.t-box{position:absolute;font-size:38px;line-height:1}
@keyframes truckBoxFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* history */
.hist-wrap{padding:0 14px 12px}
.hist-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px}
.hist-chips{display:flex;gap:6px;flex-wrap:wrap}
.hist-chip{display:flex;align-items:center;gap:5px;background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:5px 10px;cursor:pointer;transition:all 0.15s}
.hist-chip:active{background:#eff6ff;border-color:#93c5fd}
.hc-col{font-size:10px;font-weight:700;color:#fff;background:var(--navy);border-radius:4px;padding:1px 5px}
.hc-code{font-size:11px;font-weight:500;color:var(--navy)}

/* stats */
.idle-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px 4px}
.stat-card{background:var(--card);border-radius:12px;padding:12px 14px;box-shadow:0 2px 12px rgba(26,39,68,0.07);border:1px solid rgba(221,226,239,0.6);transition:transform 0.15s,box-shadow 0.15s}
.stat-num{font-size:20px;font-weight:700;color:var(--navy);line-height:1;transition:all 0.3s}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:0.3px}
.stat-bar{height:3px;border-radius:2px;background:var(--border);margin-top:8px;overflow:hidden}
.stat-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#2563eb,#60a5fa)}
.divider{height:1px;background:var(--border);margin:8px 14px 12px;opacity:0.5}

/* quick search */
.quick-wrap{padding:4px 14px 16px}
.quick-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.quick-chips{display:flex;gap:6px;flex-wrap:wrap}
.qchip{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:500;color:var(--navy);cursor:pointer;transition:all 0.15s}
.qchip:active{background:#2563eb;color:#fff;border-color:#2563eb}

/* product list */
.plist{padding:8px 12px 12px}
.lhead{padding:4px 2px 6px;font-size:11px;font-weight:600;color:var(--muted);display:flex;justify-content:space-between;letter-spacing:0.3px}
.lgrid{background:var(--card);border-radius:12px;box-shadow:0 1px 4px rgba(26,39,68,0.07);display:grid;grid-template-columns:1fr 1fr;gap:1px;background-color:var(--border);overflow:hidden;animation:fadeUp 0.2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.gitem{background:var(--card);padding:10px 12px;cursor:pointer;min-width:0;transition:background 0.1s}
.gitem:active{background:#eff6ff}
.gitem.sel{background:#f0fff8}
.gc{font-size:10px;color:#9aa8c0;margin-bottom:3px;letter-spacing:0.3px}
.gn{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--navy)}
.gn.m{color:#2563eb}

/* candidates */
.clist{padding:8px 12px 12px}
.cslb{padding:2px 2px 6px;font-size:11px;font-weight:600;color:var(--muted)}
.ccard{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(26,39,68,0.07);animation:fadeUp 0.2s ease}
.citem{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid #f2f4f8;gap:12px;cursor:pointer;transition:background 0.1s}
.citem:last-child{border-bottom:none}
.citem:active{background:#f0f4ff}
.ctag{min-width:28px;height:28px;border-radius:6px;background:var(--navy);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.iinf{flex:1;min-width:0}
.ic{font-size:10px;color:#9aa8c0;margin-bottom:2px;letter-spacing:0.3px}
.in{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--navy)}
.nf{padding:20px;text-align:center;background:var(--card);border-radius:12px;border:2px dashed var(--border);margin:10px}
.nfc{font-size:24px;font-weight:700;color:var(--red);letter-spacing:2px}
.nft{font-size:13px;color:var(--muted);margin-top:4px}

/* map */
.maptop{padding:12px 16px 8px;display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid rgba(221,226,239,0.6)}
.maplb{font-size:10px;font-weight:700;color:#2563eb;letter-spacing:1px;text-transform:uppercase}
.rtabs{display:flex;gap:8px}
.rtab{padding:5px 14px;border-radius:16px;border:1.5px solid var(--border);background:rgba(255,255,255,0.8);font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);transition:all 0.2s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(4px)}
.rtab:active{transform:scale(0.95)}
.rtab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.mapwrap{flex:1;display:flex;align-items:center;justify-content:center;padding:16px 24px 24px;overflow:hidden;background:radial-gradient(ellipse at 50% 40%,rgba(255,255,255,0.95) 0%,rgba(240,242,247,0.4) 100%);background-image:radial-gradient(ellipse at 50% 40%,rgba(255,255,255,0.95) 0%,rgba(240,242,247,0.4) 100%),linear-gradient(rgba(168,188,216,0.08) 1px,transparent 1px),linear-gradient(90deg,rgba(168,188,216,0.08) 1px,transparent 1px);background-size:100% 100%,24px 24px,24px 24px}
.mapwrap>div{width:580px;flex-shrink:0}

/* shelf */
.shelf{cursor:pointer;transition:transform 0.2s}
.shelf:hover{transform:translateY(-2px)}
.shelf rect{fill:#dce8f5;stroke:#a8bcd8;stroke-width:1.5;transition:fill 0.18s,filter 0.18s;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.08))}
.shelf text{fill:#3a5070;font-weight:700;pointer-events:none;transition:fill 0.18s}
.shelf:active rect{filter:brightness(0.9)}
@keyframes shelfPulse{0%,100%{filter:drop-shadow(0 0 8px rgba(37,99,235,0.6)) drop-shadow(0 2px 4px rgba(37,99,235,0.3))}50%{filter:drop-shadow(0 0 16px rgba(37,99,235,0.9)) drop-shadow(0 2px 8px rgba(37,99,235,0.5))}}
.shelf.hi rect{fill:#2563eb;stroke:#60a5fa;animation:shelfPulse 2.4s ease-in-out infinite}
.shelf.hi text{fill:#fff}
.shelf.di rect{fill:#e8eaed;stroke:#ccd0d8;filter:none}
.shelf.di text{fill:#b8c0cc}
.shelf.it rect{fill:#c8ddf7;stroke:#6a90cc;filter:drop-shadow(0 1px 3px rgba(100,140,200,0.25))}
.shelf.it text{fill:#1a3560}

/* maintain */
#mpage{display:none;flex:1;overflow-y:auto;padding:14px}
.mc{background:var(--card);border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(26,39,68,0.07)}
.mt{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:3px}
.ms{font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.dz{border:2px dashed var(--border);border-radius:10px;padding:24px 16px;text-align:center;cursor:pointer;background:#f8f9fc;transition:all 0.15s}
.dz.drag{border-color:#2563eb;background:#eff6ff}
.dzi{font-size:28px;margin-bottom:6px}
.dzt{font-size:13px;font-weight:500;color:var(--navy)}
.dzs{font-size:11px;color:var(--muted);margin-top:3px}
#fi{display:none}
.pvbox{margin-top:12px;display:none}
.pvstats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.chip{background:#eef2ff;color:var(--navy);border-radius:16px;padding:4px 10px;font-size:11px;font-weight:500}
.chip.g{background:#f0fff8;color:#16a34a}
.chip.a{background:#fffbeb;color:#b45309}
.pvwrap{max-height:180px;overflow-y:auto;border-radius:8px;border:1px solid var(--border)}
.pvtbl{width:100%;border-collapse:collapse;font-size:11px}
.pvtbl th{background:#f5f7fc;padding:6px 8px;text-align:left;font-weight:600;color:var(--muted);position:sticky;top:0;border-bottom:1px solid var(--border)}
.pvtbl td{padding:6px 8px;border-bottom:1px solid #f2f4f8}
.pvtbl tr:last-child td{border-bottom:none}
.abtn{width:100%;margin-top:10px;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;display:none;transition:opacity 0.15s}
.abtn:active{opacity:0.8}
.applybtn{background:#2563eb;color:#fff}
.dlbtn{background:var(--navy);color:#fff}
.stbar{border-radius:8px;padding:10px 12px;font-size:12px;font-weight:500;margin-top:10px;display:none;line-height:1.5}
.stbar.ok{background:#f0fff8;color:#16a34a;border:1px solid #bbf7d0}
.stbar.err{background:#fff5f5;color:#dc2626;border:1px solid #fecaca}
.cinfo{background:#f5f7fc;border-radius:8px;padding:10px 12px;font-size:11px;color:var(--muted);line-height:1.8}
.cinfo b{color:var(--navy)}

/* notice - simple fixed box, no nesting issues */
.notice{position:fixed;top:58px;right:12px;z-index:9999;width:236px;font-family:inherit}
.notice-inner{background:rgba(10,14,31,0.94);border:1px solid rgba(37,99,235,0.35);border-radius:10px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.35)}
.notice-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer}
.notice-title{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#60a5fa}
.ndot{width:6px;height:6px;border-radius:50%;background:#2563eb;flex-shrink:0;animation:ndot 2s ease-in-out infinite}
@keyframes ndot{0%,100%{opacity:1}50%{opacity:0.3}}
.notice-toggle{font-size:10px;color:rgba(255,255,255,0.35);padding:2px 6px}
.notice-body{padding:0 14px 12px;font-size:11px;color:rgba(255,255,255,0.65);line-height:1.7;border-top:1px solid rgba(37,99,235,0.15)}
.notice-body b{color:#fff;font-weight:600}

</style>
</head>
<body>

<!-- notice: standalone fixed element, first in body -->
<div class="notice" id="noticeWrap">
  <div class="notice-inner">
    <div class="notice-hdr" onclick="toggleNotice()">
      <div class="notice-title"><div class="ndot"></div>&#128276; お知らせ</div>
      <span class="notice-toggle" id="noticetoggle">&#9651; 略</span>
    </div>
    <div class="notice-body" id="noticebody">
      現在は<b>釣具商品のデータのみ</b>が登録されています。<br>
      今後、<b>ノベルティ</b>などのカテゴリも順次追加予定です。
    </div>
  </div>
</div>

function getRooms(){var r={};PRODUCTS.forEach(function(p){if(!r[p.room])r[p.room]={cols:[]};if(r[p.room].cols.indexOf(p.col)<0)r[p.room].cols.push(p.col);});return r;}
function getCC(){var c={};PRODUCTS.forEach(function(p){var k=p.room+'|'+p.col;c[k]=(c[k]||0)+1;});return c;}
var ROOMS=getRooms(),CC=getCC();

function pg(p){
  document.getElementById('spage').style.display=p==='s'?'flex':'none';
  document.getElementById('mpage').style.display=p==='m'?'block':'none';
  document.getElementById('bs').className='hbtn'+(p==='s'?' on':'');
  document.getElementById('bm').className='hbtn'+(p==='m'?' on':'');
  if(p==='m')updCI();
}
function updH(){document.getElementById('hsub').textContent='\u91e3\u5177PA \u2014 '+PRODUCTS.length+'\u4ef6';}
function updCI(){
  var rooms=Object.keys(ROOMS);
  var lines=rooms.map(function(r){return '<b>'+r+'</b>: '+ROOMS[r].cols.join(',')+'  ('+PRODUCTS.filter(function(p){return p.room===r;}).length+'\u4ef6)';});
  document.getElementById('cinfo').innerHTML='<b>\u5408\u8a08</b>: '+PRODUCTS.length+'\u4ef6<br>'+lines.join('<br>');
}

function svgHtml(room){return document.getElementById(room===ROOM_NAMES[0]?'svg1f':room===ROOM_NAMES[1]?'svg2f':'svg3').innerHTML;}
function renderMap(room){
  document.getElementById('mapsvg').innerHTML=svgHtml(room);
  document.getElementById('rtabs').innerHTML=ROOM_NAMES.map(function(r,i){
    return '<button class="rtab'+(r===room?' on':'')+'" onclick="swRoomIdx('+i+')">'+r+'</button>';
  }).join('');
  updMap();
}
function swRoomIdx(idx){curRoom=Object.keys(ROOMS)[idx];curCol=null;renderMap(curRoom);setList(null);}
function updMap(){
  document.querySelectorAll('.shelf').forEach(function(el){
    var col=el.id.replace('shelf-','').replace(/-.*$/,'');
    var cnt=CC[curRoom+'|'+col]||0;
    el.classList.remove('hi','di','it');
    if(curCol){if(col===curCol)el.classList.add('hi');else el.classList.add('di');}
    else if(cnt>0)el.classList.add('it');
    // 角標
    var badge=el.querySelector('.shelf-badge');
    if(!badge&&cnt>0){
      badge=document.createElementNS('http://www.w3.org/2000/svg','g');
      badge.setAttribute('class','shelf-badge');
      var rect=el.querySelector('rect');
      if(rect){
        var x=parseFloat(rect.getAttribute('x')||0)+parseFloat(rect.getAttribute('width')||30)-10;
        var y=parseFloat(rect.getAttribute('y')||0)+10;
        var bg=document.createElementNS('http://www.w3.org/2000/svg','circle');
        bg.setAttribute('cx',x);bg.setAttribute('cy',y);bg.setAttribute('r','8');bg.setAttribute('stroke','rgba(255,255,255,0.9)');bg.setAttribute('stroke-width','1.5');bg.setAttribute('filter','drop-shadow(0 1px 2px rgba(0,0,0,0.18))');
        bg.setAttribute('fill','#f5a623');
        var txt=document.createElementNS('http://www.w3.org/2000/svg','text');
        txt.setAttribute('x',x);txt.setAttribute('y',y);
        txt.setAttribute('text-anchor','middle');txt.setAttribute('dominant-baseline','middle');
        txt.setAttribute('font-size','7');txt.setAttribute('font-weight','700');
        txt.setAttribute('fill','#fff');txt.setAttribute('pointer-events','none');
        txt.textContent=cnt>99?'99+':cnt;
        badge.appendChild(bg);badge.appendChild(txt);
        el.appendChild(badge);
      }
    } else if(badge){
      var txt=badge.querySelector('text');
      var bg=badge.querySelector('circle');
      if(txt)txt.textContent=cnt>99?'99+':cnt;
      if(bg)bg.setAttribute('fill',curCol&&col===curCol?'#fff':'#f5a623');
      if(txt&&curCol&&col===curCol)txt.setAttribute('fill','#f5a623');
      else if(txt)txt.setAttribute('fill','#fff');
    }
  });
}
function bgClick(e){
  if(!e.target.closest('.shelf')){curCol=null;updMap();setList(null);if(!inp.value.trim())showEmpty();}
}
function shelfClick(col,roomIdx){
  var room=ROOM_NAMES[roomIdx];
  if(room!==curRoom){curRoom=room;renderMap(room);}
  if(curCol===col){curCol=null;updMap();setList(null);return;}
  curCol=col;updMap();setList(col,null);
}

function addHistory(p){
  HISTORY=HISTORY.filter(function(h){return h.code!==p.code;});
  HISTORY.unshift({code:p.code,name:p.name,col:p.col});
  if(HISTORY.length>6)HISTORY.pop();
}
function clearHistory(){
  HISTORY=[];
  try{localStorage.removeItem('lumi_history');}catch(e){}
  showEmpty();
}
function renderHistory(){
  if(!HISTORY.length)return'';
  var chips=HISTORY.map(function(h){
    return '<div class="hist-chip" onclick="sel(\''+h.code+'\')">'
      +'<span class="hc-col">'+h.col+'</span>'
      +'<span class="hc-code">'+h.code+'</span></div>';
  }).join('');
  return '<div class="hist-wrap">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
    +'<span class="hist-lbl" style="margin-bottom:0">&#128336; 履歴</span>'
    +'<span onclick="clearHistory()" style="font-size:10px;color:#9aa8c0;cursor:pointer;padding:2px 8px;border-radius:10px;border:1px solid #dde2ef;background:#fff">全削除</span>'
    +'</div>'
    +'<div class="hist-chips">'+chips+'</div>'
    +'</div>';
}

function srch(code){
  if(!code){showEmpty();return;}
  var isAlphaNum=/^[A-Za-z0-9]+$/.test(code);
  if(isAlphaNum)code=code.toUpperCase();
  var found=null;
  if(isAlphaNum){
    for(var i=0;i<PRODUCTS.length;i++){if(PRODUCTS[i].code===code){found=PRODUCTS[i];break;}}
  }
  if(found){
    addHistory(found);
    if(found.room!==curRoom){curRoom=found.room;renderMap(curRoom);}
    curCol=found.col;updMap();showRes(found);setList(found.col,found.code);
    return;
  }
  document.getElementById('rescrd').style.display='none';
  if(isAlphaNum){
    var byCode=PRODUCTS.filter(function(p){return p.code.indexOf(code)===0;});
    if(byCode.length){showCands(code,byCode,false);return;}
  }
  var codeLower=code.toLowerCase();
  var byName=PRODUCTS.filter(function(p){return p.name&&p.name.toLowerCase().indexOf(codeLower)>=0;});
  if(byName.length){showCands(code,byName,true);return;}
  showCands(code,[]);
}
function sel(code){inp.value=code;clrb.style.display='flex';srch(code);}

function showRes(p){
  var rc=document.getElementById('rescrd');rc.style.display='block';
  document.getElementById('pnm').textContent=p.name||p.code;
  document.getElementById('pbdg').innerHTML='<span class="badge b-code">'+p.code+'</span><span class="badge b-room">&#128205; '+p.room+'</span><span class="badge b-col">\u5217 '+p.col+'</span>';
}
function setList(col,mc){
  if(!col){if(!inp.value.trim())showEmpty();else document.getElementById('lc').innerHTML='';return;}
  var items=PRODUCTS.filter(function(p){return p.room===curRoom&&p.col===col;});
  document.getElementById('lc').innerHTML='<div class="plist"><div class="lhead"><span>\u5217 '+col+'</span><span>'+items.length+'\u4ef6</span></div><div class="lgrid">'+
    items.map(function(p){return '<div class="gitem'+(p.code===mc?' sel':'')+'" onclick="sel(\''+p.code+'\')"><div class="gc">'+p.code+'</div><div class="gn'+(p.code===mc?' m':'')+'">'+( p.name||'\u2014')+'</div></div>';}).join('')+'</div></div>';
}
function showCands(code,part,isName){
  if(!part.length){document.getElementById('lc').innerHTML='<div class="nf"><div class="nfc">'+code+'</div><div class="nft">\u8a72\u5f53\u3059\u308b\u5546\u54c1\u304c\u898b\u3064\u304b\u308a\u307e\u305b\u3093</div></div>';return;}
  var lbl=isName?'\u5546\u54c1\u540d\u691c\u7d22 '+part.length+'\u4ef6':'\u5019\u88dc '+part.length+'\u4ef6';
  var rows=part.slice(0,30).map(function(p){
    var nm=p.name||'\u2014';
    if(isName&&p.name&&p.name.indexOf(code)>=0)nm=p.name.split(code).join('<b style="color:#2563eb">'+code+'</b>');
    return '<div class="citem" onclick="sel(\''+p.code+'\')"><div class="ctag">'+p.col+'</div><div class="iinf"><div class="ic">'+p.code+'</div><div class="in">'+nm+'</div></div></div>';
  }).join('');
  document.getElementById('lc').innerHTML='<div class="clist"><div class="cslb">'+lbl+'</div><div class="ccard">'+rows+'</div></div>';
}

function countUp(el,target,duration){
  var start=0,step=Math.ceil(target/30);
  var timer=setInterval(function(){
    start+=step;
    if(start>=target){start=target;clearInterval(timer);}
    el.textContent=start;
  },duration/30);
}

function quickSearch(prefix){inp.value=prefix;clrb.style.display='flex';srch(prefix);}

function boxClick(){
  if(window._truckRunning)return;
  if(!window._bc)window._bc=0;
  window._bc++;
  var box=document.getElementById('t-box');
  if(box){box.style.transform='scale(1.3)';setTimeout(function(){box.style.transform='';},150);}
  if(window._bc>=3){window._bc=0;runTruckAnim();}
}
function initTruckEgg(){
  setTimeout(function(){if(inp.value.trim())return;runTruckAnim();},20000+Math.random()*30000);
}
function runTruckAnim(){
  if(window._truckRunning)return;
  window._truckRunning=true;
  var stage=document.getElementById('truck-stage'),truck=document.getElementById('t-truck');
  var box=document.getElementById('t-box'),road=document.getElementById('truck-road');
  var trl1=document.getElementById('trl1'),trl2=document.getElementById('trl2'),trl3=document.getElementById('trl3');
  if(!stage||!truck){window._truckRunning=false;return;}
  var W=stage.offsetWidth||320,stopX=Math.round(W*0.35);
  if(road)road.style.opacity='1';
  box.style.animation='none';box.style.opacity='0';
  var rlPos=0,rl=setInterval(function(){
    rlPos-=3;var b=((rlPos%180)+180)%180;
    if(trl1)trl1.style.left=(20+b)+'px';
    if(trl2)trl2.style.left=(20+b+160)+'px';
    if(trl3)trl3.style.left=(20+b+320)+'px';
  },16);
  var x=-100,drive=setInterval(function(){
    x+=4;truck.style.left=x+'px';
    if(x>=stopX){
      clearInterval(drive);clearInterval(rl);
      var sh=[stopX-6,stopX+4,stopX-2,stopX+1,stopX],si=0;
      var shake=setInterval(function(){if(si>=sh.length){clearInterval(shake);dropBox();return;}truck.style.left=sh[si]+'px';si++;},60);
    }
  },16);
  function dropBox(){
    box.style.left=(stopX-10)+'px';box.style.bottom='65px';box.style.opacity='1';box.style.transition='none';
    setTimeout(function(){
      box.style.transition='bottom 0.38s cubic-bezier(.4,0,.6,1.5)';box.style.bottom='22px';
      setTimeout(function(){
        box.style.transition='bottom 0.12s ease';box.style.bottom='14px';
        setTimeout(function(){
          box.style.bottom='22px';box.style.animation='truckBoxFloat 2s ease-in-out infinite';
          setTimeout(driveOut,1400);
        },120);
      },380);
    },30);
  }
  function driveOut(){
    var x2=parseInt(truck.style.left)||stopX,out=setInterval(function(){
      x2+=6;truck.style.left=x2+'px';
      if(x2>W+20){clearInterval(out);truck.style.left='-200px';box.style.transition='left 0.5s ease';box.style.left='44%';if(road)road.style.opacity='0';window._truckRunning=false;}
    },16);
  }
}

function hdrop(e){e.preventDefault();e.currentTarget.classList.remove('drag');var f=e.dataTransfer.files[0];if(f)hfile(f);}
function hfile(file){
  if(!file)return;
  showSt('ok','\u23f3 \u8aad\u307f\u8fbc\u307f\u4e2d...');
  ['applybtn','dlbtn'].forEach(function(id){document.getElementById(id).style.display='none';});
  document.getElementById('pvbox').style.display='none';
  parseXlsx(file).then(function(prods){
    if(!prods.length){showSt('err','\u274c \u30c7\u30fc\u30bf0\u4ef6');return;}
    pending=prods;showPrev(prods,file.name);
  }).catch(function(e){showSt('err','\u274c '+e.message);});
}
function showPrev(data,fn){
  var rooms=[...new Set(data.map(function(p){return p.room;}))];
  var cols=[...new Set(data.map(function(p){return p.col;}))];
  document.getElementById('pvst').innerHTML='<span class="chip g">\u2713 '+data.length+'\u4ef6</span><span class="chip">'+rooms.length+'\u30a8\u30ea\u30a2</span><span class="chip">'+cols.length+'\u5217</span><span class="chip a">'+fn+'</span>';
  document.getElementById('pvbd').innerHTML=data.slice(0,30).map(function(p){return '<tr><td>'+p.code+'</td><td>'+(p.name||'\u2014')+'</td><td>'+p.col+'</td><td>'+p.room+'</td></tr>';}).join('');
  document.getElementById('pvbox').style.display='block';
  document.getElementById('applybtn').style.display='block';
  showSt('ok','\u2713 '+data.length+'\u4ef6\u8aad\u307f\u8fbc\u3093\u3060\u3002\u78ba\u8a8d\u3057\u3066\u53cd\u6620\u3057\u3066\u304f\u3060\u3055\u3044\u3002');
}

  if(!pending)return;
  PRODUCTS=pending;ROOMS=getRooms();CC=getCC();curRoom=ROOM_NAMES[0];curCol=null;
  updH();updCI();

function dlHTML(){

  var up=h.replace(/var PRODUCTS = \[[\s\S]*?\];/,'var PRODUCTS = '+JSON.stringify(PRODUCTS)+';');

  a.download='picking_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'.html';
  a.click();URL.revokeObjectURL(a.href);
}
function showSt(t,m){var s=document.getElementById('stbar');s.className='stbar '+t;s.textContent=m;s.style.display='block';}
async function parseXlsx(file){
  var buf=await file.arrayBuffer();var bytes=new Uint8Array(buf);
  var entries=readZip(bytes);var ss=[];
  if(entries['xl/sharedStrings.xml']){var xml=await resolveE(entries['xl/sharedStrings.xml']);ss=parseSS(xml);}
  var wbx=await resolveE(entries['xl/workbook.xml']);if(!wbx)throw new Error('workbook.xml not found');
  var sheets=parseWB(wbx);
  var target=sheets.find(function(s){return s.name.indexOf('\u5546\u54c1')>=0||s.name.indexOf('\u30c7\u30fc\u30bf')>=0;})||sheets[0];
  var wse=entries['xl/worksheets/'+target.file];if(!wse)throw new Error('Sheet not found');
  var wsx=await resolveE(wse);var rows=parseWS(wsx,ss);
  var hi=-1,hc={};
  for(var i=0;i<Math.min(10,rows.length);i++){
    var vals=Object.values(rows[i]).join(' ');
    if(vals.indexOf('\u5546\u54c1\u30b3\u30fc\u30c9')>=0){
      hi=i;
      Object.entries(rows[i]).forEach(function(kv){var c=kv[0],v=kv[1];
        if(v.indexOf('\u5546\u54c1\u30b3\u30fc\u30c9')>=0)hc.code=c;
        else if(v.indexOf('\u5546\u54c1\u540d')>=0)hc.name=c;
        else if(v.indexOf('\u756a\u5730')>=0)hc.col=c;
        else if(v.indexOf('\u90e8\u5c4b\u540d')>=0&&!hc.room)hc.room=c;
        else if(v.indexOf('\u90e8\u5c4b\u756a\u53f7')>=0&&!hc.rno)hc.rno=c;
      });break;
    }
  }
  if(hi<0)throw new Error('\u30d8\u30c3\u30c0\u304c\u898b\u3064\u304b\u308a\u307e\u305b\u3093');
  if(!hc.code||!hc.col||!hc.room)throw new Error('\u5fc5\u8981\u5217\u304c\u3042\u308a\u307e\u305b\u3093');
  var prods=[];
  for(var i=hi+1;i<rows.length;i++){
    var row=rows[i],code=(row[hc.code]||'').trim(),col=(row[hc.col]||'').trim(),room=(row[hc.room]||'').trim();
    if(!code||!col||!room||code[0]==='='||code[0]==='#')continue;
    var name=hc.name?(row[hc.name]||'').trim():'';
    if(name&&(name[0]==='='||name[0]==='#'))name='';
    var rno=hc.rno?(row[hc.rno]||'').replace(/\.0*$/,'').trim():'';
    prods.push({code:code,name:name,col:col,room:room,room_no:rno});
  }
  return prods;
}
