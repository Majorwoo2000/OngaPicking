<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ルミピッキング検索</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#1a2744;--navy2:#243259;--teal:#2563eb;--teal2:#60a5fa;--red:#e84040;--bg:#f0f2f7;--card:#fff;--muted:#6b7a99;--border:#dde2ef;}
body{background:var(--bg);color:var(--navy);font-family:-apple-system,BlinkMacSystemFont,sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
header{background:#0a0e1f;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid rgba(37,99,235,0.3);position:relative}
header::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,#2563eb 35%,#7f77dd 70%,transparent 100%);pointer-events:none}
.logo{width:28px;height:28px;background:linear-gradient(135deg,#2563eb,#60a5fa);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(37,99,235,0.4)}
h1{font-size:14px;font-weight:600;flex:1}
h1 small{font-size:10px;color:rgba(255,255,255,0.5);display:block;font-weight:400}
.hbtn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer;transition:all 0.15s;backdrop-filter:blur(4px)}
.hbtn:active{transform:scale(0.93)}
.hbtn.on{background:#2563eb;border-color:#2563eb}
.layout{display:flex;flex:1;overflow:hidden}
.lpanel{display:flex;flex-direction:column;width:400px;flex-shrink:0;border-right:1px solid var(--border)}
.sbar{background:linear-gradient(135deg,#1e2d52,#2a3d6e);padding:12px 14px;flex-shrink:0}
.swrap{display:flex;gap:8px;align-items:center;background:rgba(255,255,255,0.1);border-radius:10px;padding:8px 12px;border:1.5px solid rgba(255,255,255,0.15);transition:border-color 0.2s}
.swrap:focus-within{border-color:#2563eb}
#si{background:none;border:none;outline:none;flex:1;font-size:20px;font-weight:700;color:#fff;letter-spacing:2px;width:0;min-width:0}
#si::placeholder{color:rgba(255,255,255,0.3);font-size:13px;font-weight:400;letter-spacing:0}
.clr{background:rgba(255,255,255,0.15);border:none;color:#fff;width:26px;height:26px;border-radius:50%;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center}
.hint{font-size:10px;color:rgba(255,255,255,0.4);text-align:center;padding:4px 0 0}
.rescrd{margin:12px 14px 0;background:var(--card);border-radius:12px;padding:14px 16px;border:none;border-top:2px solid transparent;background-clip:padding-box;box-shadow:0 4px 20px rgba(37,99,235,0.15);display:none;flex-shrink:0;animation:slin 0.18s ease;position:relative;overflow:hidden}.rescrd::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#2563eb,#7f77dd)}
@keyframes slin{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.pname{font-size:15px;font-weight:700;margin-bottom:8px;line-height:1.3;color:var(--navy)}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.badge{display:inline-flex;border-radius:16px;padding:5px 12px;font-size:11px;font-weight:500}
.b-code{background:#f5f7fa;color:var(--muted)}
.b-room{background:#eef2ff;color:var(--navy);border:1px solid #c7d1ef}
.b-col{background:#2563eb;color:#fff;font-size:15px;font-weight:700;padding:5px 14px}
.lcontent{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:linear-gradient(180deg,#f0f2f7 0%,#eef0f6 100%)}

/* ---- idle screen ---- */
.idle-box{padding:20px 14px 0;text-align:center}
.idle-box .ei{font-size:40px;margin-bottom:10px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}@keyframes shelfPulse{0%,100%{filter:drop-shadow(0 0 8px rgba(37,99,235,0.6)) drop-shadow(0 2px 4px rgba(37,99,235,0.3))}50%{filter:drop-shadow(0 0 16px rgba(37,99,235,0.9)) drop-shadow(0 2px 8px rgba(37,99,235,0.5))}}
.idle-box .et{font-size:15px;font-weight:500;color:var(--navy);letter-spacing:0.2px}
.idle-box .es{font-size:12px;color:#b0b8c8;margin-top:6px}
.truck-stage{position:relative;width:100%;height:80px;overflow:hidden;margin:4px 0 8px}
.truck-road{position:absolute;bottom:0;left:0;right:0;height:20px;background:#dde2ef;border-radius:3px;opacity:0;transition:opacity 0.4s}
.truck-rl{position:absolute;bottom:7px;height:3px;width:36px;background:#c8d0e0;border-radius:2px}
.t-box{position:absolute;font-size:38px;line-height:1}
@keyframes truckBoxFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* ---- info grid ---- */
.idle-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px 4px}
.stat-card{background:var(--card);border-radius:12px;padding:10px 12px;box-shadow:0 2px 8px rgba(26,39,68,0.06);border:1px solid rgba(221,226,239,0.8)}
.stat-num{font-size:20px;font-weight:700;color:var(--navy);line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:0.3px}
.stat-bar{height:3px;border-radius:2px;background:var(--border);margin-top:8px;overflow:hidden}
.stat-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#2563eb,#60a5fa)}

/* ---- quick search ---- */
.quick-wrap{padding:4px 14px 16px}
.quick-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.quick-chips{display:flex;gap:6px;flex-wrap:wrap}
.qchip{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:500;color:var(--navy);cursor:pointer;transition:all 0.15s}
.qchip:active{background:#2563eb;color:#fff;border-color:#2563eb}
.divider{height:1px;background:var(--border);margin:4px 14px 8px;opacity:0.6}

/* ---- product list ---- */
.plist{padding:8px 12px 12px}
.lhead{padding:4px 2px 6px;font-size:11px;font-weight:600;color:var(--muted);display:flex;justify-content:space-between;letter-spacing:0.3px}
.lgrid{background:var(--card);border-radius:12px;box-shadow:0 1px 4px rgba(26,39,68,0.07);display:grid;grid-template-columns:1fr 1fr;gap:1px;background-color:var(--border);overflow:hidden}
.gitem{background:var(--card);padding:10px 12px;cursor:pointer;min-width:0;transition:background 0.1s}
.gitem:active{background:#e8f4ff}
.gitem.sel{background:#f0fff8}
.gc{font-size:10px;color:#9aa8c0;margin-bottom:3px;letter-spacing:0.3px}
.gn{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--navy)}
.gn.m{color:var(--teal);font-weight:600}
.clist{padding:8px 12px 12px}
.cslb{padding:2px 2px 6px;font-size:11px;font-weight:600;color:var(--muted)}
.ccard{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(26,39,68,0.07)}
.citem{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid #f2f4f8;gap:12px;cursor:pointer;transition:background 0.1s}
.citem:last-child{border-bottom:none}
.citem:active{background:#f0f4ff}
.ctag{min-width:28px;height:28px;border-radius:6px;background:#1a2744;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.iinf{flex:1;min-width:0}
.ic{font-size:10px;color:#9aa8c0;margin-bottom:2px;letter-spacing:0.3px}
.in{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--navy)}
.nf{padding:20px;text-align:center;background:var(--card);border-radius:12px;border:2px dashed var(--border);margin:10px}
.nfc{font-size:24px;font-weight:700;color:var(--red);letter-spacing:2px}
.nft{font-size:13px;color:var(--muted);margin-top:4px}

/* ---- map ---- */
.rpanel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:linear-gradient(160deg,#f5f7fc,#eef1f8)}
.maptop{padding:12px 16px 8px;display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid rgba(221,226,239,0.6)}
.maplb{font-size:10px;font-weight:700;color:#2563eb;letter-spacing:1px;text-transform:uppercase}
.rtabs{display:flex;gap:8px}
.rtab{padding:5px 14px;border-radius:16px;border:1.5px solid var(--border);background:rgba(255,255,255,0.8);font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);transition:all 0.15s;backdrop-filter:blur(4px)}
.rtab:active{transform:scale(0.95)}
.rtab.on{background:#1a2744;color:#fff;border-color:#1a2744}
.mapwrap{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 20px 20px;overflow:hidden;background:radial-gradient(ellipse at center,rgba(255,255,255,0.9) 0%,transparent 70%)}
.mapwrap>div{width:580px;flex-shrink:0}
.shelf{cursor:pointer;transition:transform 0.15s}
.shelf:hover{transform:translateY(-1px)}
.shelf rect{fill:#dce8f5;stroke:#a8bcd8;stroke-width:1.5;transition:fill 0.18s,filter 0.18s;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.08))}
.shelf text{fill:#3a5070;font-weight:700;pointer-events:none;transition:fill 0.18s}
.shelf:active rect{filter:brightness(0.9)}
.shelf.hi rect{fill:#2563eb;stroke:#60a5fa;animation:shelfPulse 2.4s ease-in-out infinite}
.shelf.hi text{fill:#fff}
.shelf.di rect{fill:#e8eaed;stroke:#ccd0d8;filter:none}
.shelf.di text{fill:#b8c0cc}
.shelf.it rect{fill:#c8ddf7;stroke:#6a90cc;filter:drop-shadow(0 1px 3px rgba(100,140,200,0.25))}
.shelf.it text{fill:#1a3560}

/* ---- maintain ---- */
#mpage{display:none;flex:1;overflow-y:auto;padding:14px}
.mc{background:var(--card);border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(26,39,68,0.07)}
.mt{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:3px}
.ms{font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.dz{border:2px dashed var(--border);border-radius:10px;padding:24px 16px;text-align:center;cursor:pointer;background:#f8f9fc;transition:all 0.15s}
.dz.drag{border-color:var(--teal);background:#f0fffe}
.dzi{font-size:28px;margin-bottom:6px}
.dzt{font-size:13px;font-weight:500;color:var(--navy)}
.dzs{font-size:11px;color:var(--muted);margin-top:3px}
#fi{display:none}
.pvbox{margin-top:12px;display:none}
.pvstats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.chip{background:#eef2ff;color:var(--navy);border-radius:16px;padding:4px 10px;font-size:11px;font-weight:500}
.chip.g{background:#f0fff8;color:#16a34a}
.chip.a{background:#fffbeb;color:#b45309}
.pvwrap{max-height:180px;overflow-y:auto;border-radius:8px;border:1px solid var(--border)}
.pvtbl{width:100%;border-collapse:collapse;font-size:11px}
.pvtbl th{background:#f5f7fc;padding:6px 8px;text-align:left;font-weight:600;color:var(--muted);position:sticky;top:0;border-bottom:1px solid var(--border)}
.pvtbl td{padding:6px 8px;border-bottom:1px solid #f2f4f8}
.pvtbl tr:last-child td{border-bottom:none}
.abtn{width:100%;margin-top:10px;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;display:none}
.abtn:active{opacity:0.8}
.applybtn{background:var(--teal);color:#fff}
.dlbtn{background:var(--navy);color:#fff}
.stbar{border-radius:8px;padding:10px 12px;font-size:12px;font-weight:500;margin-top:10px;display:none;line-height:1.5}
.stbar.ok{background:#f0fff8;color:#16a34a;border:1px solid #bbf7d0}
.stbar.err{background:#fff5f5;color:#dc2626;border:1px solid #fecaca}
.cinfo{background:#f5f7fc;border-radius:8px;padding:10px 12px;font-size:11px;color:var(--muted);line-height:1.8}
.cinfo b{color:var(--navy)}
</style>
</head>

middle" dominant-baseline="middle" font-size="16" font-weight="700">A</text></g><g class="shelf" id="shelf-L" onclick="shelfClick('L',0)"><rect x="234" y="16" width="218" height="40" rx="6"/><text x="343" y="36" text-anchor="middle" dominant-baseline="middle" font-size="16" font-weight="700">L</text></g><g class="shelf" id="shelf-K" onclick="shelfClick('K',0)"><rect x="234" y="66" width="218" height="40" rx="6"/><text x="343" y="86" text-anchor="middle" dominant-baseline="middle" font-size="16" font-weight="700">K</text></g><g class="shelf" id="shelf-J" onclick="shelfClick('J',0)"><rect x="234" y="106" width="218" height="40" rx="6"/><text x="343" y="126" text-anchor="middle" dominant-baseline="middle" font-size="16" font-weight="700">J</text></g><g class="shelf" id="shelf-I" onclick="shelfClick('I',0)"><rect x="234" y="156" width="218" height="40" rx="6"/><text x="343" y="176" text-anchor="middle" dominant-baseline="middle" font-size="16" font-weight="700">I</text></g><g class="shelf" id="shelf-H" onclick="shelfClick('H',0)"><rect x="234" y="196" width="218" height="40" rx="6"/><text x="343" y="216" text-anchor="middle" dominant-baseline="middle" font-size="16" font-weight="700">H</text></g><g class="shelf" id="shelf-G" onclick="shelfClick('G',0)"><rect x="234" y="248" width="218" height="40" rx="6"/><text x="343" y="268" text-anchor="middle" dominant-baseline="middle" font-size="16" font-weight="700">G</text></g><polygon points="217,232 207,246 227,246" fill="#5b9bd5" opacity="0.85"/><rect x="207" y="246" width="20" height="42" rx="2" fill="#5b9bd5" opacity="0.7"/><rect x="174" y="298" width="86" height="22" rx="11" fill="#5b9bd5" opacity="0.9"/><text x="217" y="309" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="600" fill="#fff">入口（ノベルティ）</text><text x="250" y="342" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#9a8f80">【1F釣具部屋】</text></svg></div>

<header>
  <div class="logo"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
  <h1>ルミピッキング検索<small id="hsub">読み込み中...</small></h1>
  <span style="font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:0.5px;margin-right:4px">by MajorWoo / ウー</span>
  <div style="display:flex;gap:6px">
    <button class="hbtn on" id="bs" onclick="pg('s')">検索</button>
    <button class="hbtn" id="bm" onclick="pg('m')">データ更新</button>
  </div>
</header>
<div class="layout" id="spage">
  <div class="lpanel">
    <div class="sbar">
      <div class="swrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="si" type="text" placeholder="商品コード (例: A20242)" autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="clr" id="clrb" onclick="clrs()">✕</button>
      </div>
      <div class="hint">英大文字+数字で検索</div>
    </div>
    <div class="rescrd" id="rescrd"><div class="pname" id="pnm"></div><div class="badges" id="pbdg"></div></div>
    <div class="lcontent" id="lc"></div>
  </div>
  <div class="rpanel">
    <div class="maptop"><span class="maplb">MAP</span><div class="rtabs" id="rtabs"></div></div>
    <div class="mapwrap"><div id="mapsvg"></div></div>
  </div>
</div>
<div id="mpage">
  <div class="mc"><div class="mt">現在のデータ</div><div class="ms">現在メモリに読み込まれているデータです</div><div class="cinfo" id="cinfo">読み込み中...</div></div>
  <div class="mc">
    <div class="mt">Excelファイルを読み込む</div>
    <div class="ms">「商品データ」シートを含む .xlsx を選択。完全オフライン対応。</div>
    <div class="dz" id="dz" onclick="document.getElementById('fi').click()"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="hdrop(event)">
      <div class="dzi">&#128194;</div>
      <div class="dzt">タップしてファイルを選択</div>
      <div class="dzs">または、ここにドラッグ&amp;ドロップ</div>
    </div>
    <input type="file" id="fi" accept=".xlsx" onchange="hfile(this.files[0])">
    <div class="pvbox" id="pvbox"><div class="pvstats" id="pvst"></div><div class="pvwrap"><table class="pvtbl"><thead><tr><th>商品コード</th><th>商品名</th><th>列</th><th>部屋</th></tr></thead><tbody id="pvbd"></tbody></table></div></div>
    <div class="stbar" id="stbar"></div>
    <button class="abtn applybtn" id="applybtn" onclick="applyData()">✓ このデータを反映する</button>
    <button class="abtn dlbtn" id="dlbtn" onclick="dlHTML()">&#11015; 新しいHTMLをダウンロード</button>
  </div>

  html+='<div class="stat-card"><div class="stat-num">'+rooms.length+'</div><div class="stat-lbl">\u30a8\u30ea\u30a2</div><div class="stat-bar"><div class="stat-fill" style="width:100%;background:linear-gradient(90deg,#6a90cc,#a0b8e8)"></div></div></div>';
  if(room1)html+='<div class="stat-card"><div class="stat-num">'+cnt1+'</div><div class="stat-lbl">'+room1+'</div><div class="stat-bar"><div class="stat-fill" style="width:'+Math.round(cnt1/total*100)+'%"></div></div></div>';
  if(room2)html+='<div class="stat-card"><div class="stat-num">'+cnt2+'</div><div class="stat-lbl">'+room2+'</div><div class="stat-bar"><div class="stat-fill" style="width:'+Math.round(cnt2/total*100)+'%;background:linear-gradient(90deg,#f5a623,#f7c06a)"></div></div></div>';

function quickSearch(prefix){inp.value=prefix;clrb.style.display='flex';srch(prefix);}
function boxClick(){
  if(window._bc===undefined)window._bc=0;
  window._bc++;
  var box=document.getElementById('t-box');
  if(box){box.style.transform='scale(1.3)';setTimeout(function(){box.style.transform='';},150);}
  if(window._bc>=3){window._bc=0;runTruckAnim();}
}
function initTruckEgg(){
  var delay=20000+Math.random()*30000;
  setTimeout(function(){if(inp.value.trim())return;runTruckAnim();},delay);
}
function runTruckAnim(){
  var stage=document.getElementById('truck-stage');
  var truck=document.getElementById('t-truck');
  var box=document.getElementById('t-box');
  var road=document.getElementById('truck-road');
  var trl1=document.getElementById('trl1');
  var trl2=document.getElementById('trl2');
  var trl3=document.getElementById('trl3');
  if(!stage||!truck)return;
  var stageW=stage.offsetWidth||320;
  var stopX=Math.round(stageW*0.35);
  if(road)road.style.opacity='1';
  box.style.animation='none';box.style.opacity='0';
  var rlPos=0;
  var rlTimer=setInterval(function(){
    rlPos-=3;var b=((rlPos%180)+180)%180;
    if(trl1)trl1.style.left=(20+b)+'px';
    if(trl2)trl2.style.left=(20+b+160)+'px';
    if(trl3)trl3.style.left=(20+b+320)+'px';
  },16);
  var x=-100;
  var driveIn=setInterval(function(){
    x+=4;truck.style.left=x+'px';
    if(x>=stopX){
      clearInterval(driveIn);clearInterval(rlTimer);
      var shakes=[stopX-6,stopX+4,stopX-2,stopX+1,stopX],si=0;
      var sh=setInterval(function(){
        if(si>=shakes.length){clearInterval(sh);dropBox();return;}
        truck.style.left=shakes[si]+'px';si++;
      },60);
    }
  },16);
  function dropBox(){
    box.style.left=(stopX-10)+'px';box.style.bottom='65px';box.style.opacity='1';box.style.transition='none';
    setTimeout(function(){
      box.style.transition='bottom 0.38s cubic-bezier(.4,0,.6,1.5)';box.style.bottom='22px';
      setTimeout(function(){
        box.style.transition='bottom 0.12s ease';box.style.bottom='14px';
        setTimeout(function(){
          box.style.bottom='22px';box.style.animation='truckBoxFloat 2s ease-in-out infinite';
          setTimeout(driveOut,1400);
        },120);
      },380);
    },30);
  }
  function driveOut(){
    var x2=parseInt(truck.style.left)||stopX;
    var out=setInterval(function(){
      x2+=6;truck.style.left=x2+'px';
      if(x2>stageW+20){
        clearInterval(out);truck.style.left='-200px';
        box.style.transition='left 0.5s ease';box.style.left='44%';
        if(road)road.style.opacity='0';
      }
    },16);
  }
}
function hdrop(e){e.preventDefault();e.currentTarget.classList.remove('drag');var f=e.dataTransfer.files[0];if(f)hfile(f);}
function hfile(file){
  if(!file)return;
  showSt('ok','\u23f3 \u8aad\u307f\u8fbc\u307f\u4e2d...');
  ['applybtn','dlbtn'].forEach(function(id){document.getElementById(id).style.display='none';});
  document.getElementById('pvbox').style.display='none';
  parseXlsx(file).then(function(prods){
    if(!prods.length){showSt('err','\u274c \u30c7\u30fc\u30bf0\u4ef6');return;}
    pending=prods;showPrev(prods,file.name);
  }).catch(function(e){showSt('err','\u274c '+e.message);});
}
function showPrev(data,fn){
  var rooms=[...new Set(data.map(function(p){return p.room;}))];
  var cols=[...new Set(data.map(function(p){return p.col;}))];

  document.getElementById('pvbd').innerHTML=data.slice(0,30).map(function(p){return '<tr><td>'+p.code+'</td><td>'+(p.name||'\u2014')+'</td><td>'+p.col+'</td><td>'+p.room+'</td></tr>';}).join('');
  document.getElementById('pvbox').style.display='block';
  document.getElementById('applybtn').style.display='block';
  showSt('ok','\u2713 '+data.length+'\u4ef6\u8aad\u307f\u8fbc\u3093\u3060\u3002\u78ba\u8a8d\u3057\u3066\u53cd\u6620\u3057\u3066\u304f\u3060\u3055\u3044\u3002');
}

  if(!pending)return;

function dlHTML(){
  var h=document.documentElement.outerHTML;
  var nd=JSON.stringify(PRODUCTS);
  var up=h.replace(/var PRODUCTS = \[[\s\S]*?\];/,'var PRODUCTS = '+nd+';');
  var b=new Blob([up],{type:'text/html;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);
  var d=new Date();var ds=d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  a.download='picking_'+ds+'.html';a.click();URL.revokeObjectURL(a.href);
}
function showSt(t,m){var s=document.getElementById('stbar');s.className='stbar '+t;s.textContent=m;s.style.display='block';}
async function parseXlsx(file){
  var buf=await file.arrayBuffer();var bytes=new Uint8Array(buf);
  var entries=readZip(bytes);var ss=[];
  if(entries['xl/sharedStrings.xml']){var xml=await resolveE(entries['xl/sharedStrings.xml']);ss=parseSS(xml);}
  var wbx=await resolveE(entries['xl/workbook.xml']);
  if(!wbx)throw new Error('workbook.xml not found');
  var sheets=parseWB(wbx);
  var target=sheets.find(function(s){return s.name.indexOf('\u5546\u54c1')>=0||s.name.indexOf('\u30c7\u30fc\u30bf')>=0;})||sheets[0];
  var wse=entries['xl/worksheets/'+target.file];
  if(!wse)throw new Error('Sheet not found');
  var wsx=await resolveE(wse);var rows=parseWS(wsx,ss);
  var hi=-1,hc={};
  for(var i=0;i<Math.min(10,rows.length);i++){
    var vals=Object.values(rows[i]).join(' ');
    if(vals.indexOf('\u5546\u54c1\u30b3\u30fc\u30c9')>=0){
      hi=i;
      Object.entries(rows[i]).forEach(function(kv){var c=kv[0],v=kv[1];
        if(v.indexOf('\u5546\u54c1\u30b3\u30fc\u30c9')>=0)hc.code=c;
        else if(v.indexOf('\u5546\u54c1\u540d')>=0)hc.name=c;
        else if(v.indexOf('\u756a\u5730')>=0)hc.col=c;
        else if(v.indexOf('\u90e8\u5c4b\u540d')>=0&&!hc.room)hc.room=c;
        else if(v.indexOf('\u90e8\u5c4b\u756a\u53f7')>=0&&!hc.rno)hc.rno=c;
      });break;
    }
  }
  if(hi<0)throw new Error('\u30d8\u30c3\u30c0\u304c\u898b\u3064\u304b\u308a\u307e\u305b\u3093');
  if(!hc.code||!hc.col||!hc.room)throw new Error('\u5fc5\u8981\u5217\u304c\u3042\u308a\u307e\u305b\u3093');
  var prods=[];
  for(var i=hi+1;i<rows.length;i++){
    var row=rows[i],code=(row[hc.code]||'').trim(),col=(row[hc.col]||'').trim(),room=(row[hc.room]||'').trim();
    if(!code||!col||!room||code[0]==='='||code[0]==='#')continue;
    var name=hc.name?(row[hc.name]||'').trim():'';
    if(name&&(name[0]==='='||name[0]==='#'))name='';
    var rno=hc.rno?(row[hc.rno]||'').replace(/\.0*$/,'').trim():'';
    prods.push({code:code,name:name,col:col,room:room,room_no:rno});
  }
  return prods;
}
function readZip(bytes){
  var entries={},eocd=-1;
  for(var i=bytes.length-22;i>=0;i--){if(bytes[i]===0x50&&bytes[i+1]===0x4B&&bytes[i+2]===0x05&&bytes[i+3]===0x06){eocd=i;break;}}
  if(eocd<0)throw new Error('ZIP error');
  var cdOff=u32(bytes,eocd+16),cdSz=u32(bytes,eocd+12),pos=cdOff;
  while(pos<cdOff+cdSz){
    if(u32(bytes,pos)!==0x02014b50)break;
    var fnLen=u16(bytes,pos+28),exLen=u16(bytes,pos+30),cmLen=u16(bytes,pos+32);
    var method=u16(bytes,pos+10),lhOff=u32(bytes,pos+42);
    var fname=new TextDecoder().decode(bytes.slice(pos+46,pos+46+fnLen));
    var lfnLen=u16(bytes,lhOff+26),lexLen=u16(bytes,lhOff+28);
    var dStart=lhOff+30+lfnLen+lexLen,cSz=u32(bytes,pos+20);
    var chunk=bytes.slice(dStart,dStart+cSz);
    if(method===0)entries[fname]=new TextDecoder().decode(chunk);
    else if(method===8)entries[fname]={c:chunk};
    pos+=46+fnLen+exLen+cmLen;
  }
  return entries;
}
async function resolveE(e){
  if(!e)return'';if(typeof e==='string')return e;
  if(e.c){
    var ds=new DecompressionStream('deflate-raw');
    var w=ds.writable.getWriter();w.write(e.c);w.close();
    var chunks=[],r=ds.readable.getReader();
    while(true){var x=await r.read();if(x.done)break;chunks.push(x.value);}
    var tot=chunks.reduce(function(s,c){return s+c.length;},0);
    var out=new Uint8Array(tot);var off=0;
    chunks.forEach(function(c){out.set(c,off);off+=c.length;});
    return new TextDecoder().decode(out);
  }return'';
}
function u16(b,o){return b[o]|(b[o+1]<<8);}
function u32(b,o){return(b[o]|(b[o+1]<<8)|(b[o+2]<<16)|(b[o+3]<<24))>>>0;}
function parseSS(xml){var s=[],re=/<si>[\s\S]*?<\/si>/g,m;while((m=re.exec(xml))!==null)s.push(m[0].replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim());return s;}
function parseWB(xml){var s=[],re=/<sheet\s[^>]*>/g,m;while((m=re.exec(xml))!==null){var t=m[0],n=(t.match(/name="([^"]*)"/))||['',''],id=(t.match(/sheetId="([^"]*)"/))||['','1'];s.push({name:n[1],file:'sheet'+id[1]+'.xml'});}if(!s.length)s.push({name:'Sheet1',file:'sheet1.xml'});return s;}
function parseWS(xml,ss){
  var rows=[],rowRe=/<row\b[^>]*>([\s\S]*?)<\/row>/g,cellRe=/<c\b([^>]*)>([\s\S]*?)<\/c>/g,rowM;
  while((rowM=rowRe.exec(xml))!==null){
    var rd={},cellM;cellRe.lastIndex=0;
    while((cellM=cellRe.exec(rowM[1]))!==null){
      var attrs=cellM[1],inner=cellM[2];
      var ref=(attrs.match(/r="([^"]*)"/))||['',''];
      var type=(attrs.match(/t="([^"]*)"/))||['',''];
      var col=ref[1].replace(/[0-9]/g,'');
      var vM=inner.match(/<v>([\s\S]*?)<\/v>/);
      var val=vM?vM[1]:'';
      if(type[1]==='s')val=ss[parseInt(val)]||'';
      else if(type[1]==='inlineStr'){var tM=inner.match(/<t>([\s\S]*?)<\/t>/);val=tM?tM[1]:'';}
      val=val.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#xD;/g,'').trim();
      rd[col]=val;
    }
    if(Object.keys(rd).length)rows.push(rd);
  }
  return rows;
}
setInterval(function(){if(!inp.value.trim())showEmpty();},60000);
updH();updCI();renderMap(ROOM_NAMES[0]);showEmpty();
